{% extends 'base.html' %}
{% block title %}Delete Subtask | Hangarin{% endblock %}
{% block page_title %}Delete Subtask{% endblock %}
{% block content %}
<div class="card" style="max-width: 500px; margin: 0 auto; text-align: center;">
    <i class="fas fa-exclamation-triangle" style="font-size: 3rem; color: #ef4444; margin-bottom: 1.5rem;"></i>
    <h3>Are you sure?</h3>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">You are about to delete the subtask "<strong>{{ object.title }}</strong>". This action cannot be undone.</p>
    <form method="post">
        {% csrf_token %}
        <div style="display: flex; gap: 1rem; justify-content: center;">
            <a href="{% url 'subtask-list' %}" class="btn" style="background: rgba(0,0,0,0.05);">Cancel</a>
            <button type="submit" class="btn" style="background: #ef4444; color: white;">Confirm Delete</button>
        </div>
    </form>
</div>
{% endblock %}
