{% extends 'base.html' %}

{% block title %}Delete Task | Hangarin{% endblock %}
{% block page_title %}Confirm Deletion{% endblock %}

{% block content %}
<div class="card" style="max-width: 500px; margin: 4rem auto; text-align: center;">
    <div style="font-size: 3rem; color: #ef4444; margin-bottom: 1rem;">
        <i class="fas fa-exclamation-triangle"></i>
    </div>
    <h2>Are you sure?</h2>
    <p style="color: var(--text-muted); margin-bottom: 2rem;">
        You are about to delete the task "<strong>{{ object.title }}</strong>". This action cannot be undone.
    </p>
    <form method="POST">
        {% csrf_token %}
        <div style="display: flex; justify-content: center; gap: 1rem;">
            <a href="{% url 'task-list' %}" class="btn" style="background: rgba(255,255,255,0.05); color: white;">No, Cancel</a>
            <button type="submit" class="btn" style="background: #ef4444; color: white;">Yes, Delete Task</button>
        </div>
    </form>
</div>
{% endblock %}
