{% extends 'base.html' %}
{% block content %}
<div class="content">
    <div class="container-fluid">
        <h4 class="page-title">Prioritys</h4>
        <div class="row">
            <div class="col-md-12">
                <div class="card">
                    <div class="card-header">
                        <div class="card-title">Priority List <a href="{% url 'priority-add' %}" class="btn btn-primary btn-sm float-right">Add New</a></div>
                    </div>
                    <div class="card-body">
                        <table class="table table-striped mt-3">
                            <thead>
                                <tr>
                                    <th>ID</th>
                                    <th>Priority Name / Details</th>
                                    <th>Actions</th>
                                </tr>
                            </thead>
                            <tbody>
                                {% for item in priority_list %}
                                <tr>
                                    <td>{{ item.id }}</td>
                                    <td>{{ item }}</td>
                                    <td>
                                        <a href="{% url 'priority-update' item.id %}">Edit</a> |
                                        <a href="{% url 'priority-delete' item.id %}" class="text-danger">Delete</a>
                                    </td>
                                </tr>
                                {% empty %}
                                <tr><td colspan="3" class="text-center">No records found.</td></tr>
                                {% endfor %}
                            </tbody>
                        </table>
                        {% include 'includes/pagination.html' %}
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
