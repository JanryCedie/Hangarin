{% extends 'base.html' %}
{% load widget_tweaks %}
{% block content %}
<div class="content">
    <div class="container-fluid">
        <h4 class="page-title">Note Form</h4>
        <div class="card">
            <div class="card-body">
                <form method="post">
                    {% csrf_token %}
                    {% for field in form %}
                    <div class="form-group">
                        <label>{{ field.label }}</label>
                        {% render_field field class="form-control" %}
                    </div>
                    {% endfor %}
                    <button type="submit" class="btn btn-success mt-3">Save</button>
                    <a href="{% url 'note-list' %}" class="btn btn-secondary mt-3">Cancel</a>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
